name: finance_copilot
description: "Centro de Comando Financiero - Plataforma SaaS Premium con IA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core & State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  
  # Firebase & GCP
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  firebase_auth: ^4.17.8
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^1.4.1
  
  # IA & Gemini
  google_generative_ai: ^0.2.2
  
  # UI Premium & Glassmorphism
  fl_chart: ^0.66.2
  glassmorphism: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  
  # Productividad & Datos
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  freezed: ^2.4.7
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
