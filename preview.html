<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas del Hogar | Bimont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F2EDE4;
            color: #4A443F;
            margin: 0;
            overflow: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(139, 115, 91, 0.2);
            border-radius: 10px;
        }
        .font-serif {
            font-family: 'Outfit', serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
                ledger: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                manager: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>,
                simulator: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m16 10-4 4-4-4"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5v14"/></svg>,
                shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            };
            return <div className={className}>{icons[name] || icons.dashboard}</div>;
        };

        const App = () => {
            const [isLogged, setIsLogged] = useState(false);
            const [currentView, setCurrentView] = useState('dashboard');
            
            if (!isLogged) {
                return (
                    <div className="min-h-screen bg-[#F2EDE4] flex items-center justify-center p-6">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="max-w-md w-full bg-white rounded-[48px] p-12 shadow-2xl text-center space-y-8">
                            <div className="flex justify-center">
                                <div className="p-6 bg-[#E8DFD1]/30 rounded-[32px] text-[#8B735B]">
                                    <Icon name="shield" size={48} />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <h1 className="text-4xl font-serif text-[#4A443F]">Finanzas del Hogar</h1>
                                <p className="text-xs opacity-40 uppercase font-black tracking-widest">Protocolo de Acceso Seguro</p>
                            </div>
                            <button onClick={() => setIsLogged(true)} className="w-full py-5 rounded-full bg-[#8B735B] text-white font-black text-lg shadow-xl uppercase tracking-widest">Entrar con Google</button>
                            <p className="text-[10px] opacity-20 uppercase font-bold tracking-tighter">Bimont Hogar v1.0 • Acceso Encriptado</p>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex">
                    <aside className="w-24 bg-[#E8DFD1]/50 backdrop-blur-xl border-r border-white/20 flex flex-col items-center py-8 z-20">
                        <div className="flex-1 flex flex-col gap-4">
                            {['dashboard', 'ledger', 'manager', 'simulator'].map(id => (
                                <button key={id} onClick={() => setCurrentView(id)} className={`flex flex-col items-center gap-1 p-4 ${currentView === id ? 'text-[#8B735B]' : 'text-[#4A443F]/40'}`}>
                                    <div className={`p-3 rounded-2xl ${currentView === id ? 'bg-white shadow-lg' : ''}`}><Icon name={id} /></div>
                                </button>
                            ))}
                        </div>
                    </aside>
                    <main className="flex-1 p-8">
                        <h1 className="text-3xl font-serif opacity-90 capitalize">{currentView === 'dashboard' ? 'Resumen del Hogar' : currentView}</h1>
                        <div className="mt-12 bg-white/40 h-64 rounded-[32px] border border-white flex items-center justify-center italic opacity-30">
                            Cargando datos de Finanzas del Hogar...
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
