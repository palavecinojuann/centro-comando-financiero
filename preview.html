<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Finanzas del Hogar | Luxury Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800;900&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        :root { --bg: #F2EDE4; --accent: #8B735B; --gold: #D9A852; --dark: #4A443F; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; overflow: hidden; }
        .luxury-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.3); border-right: 1px solid rgba(255, 255, 255, 0.3); border-radius: 40px; box-shadow: 10px 20px 40px rgba(139, 115, 91, 0.08), -10px -10px 30px rgba(255,255,255,0.8); }
        .luxury-btn { background: linear-gradient(145deg, #ffffff, #e6e1d9); border: 1px solid rgba(255,255,255,0.8); box-shadow: 5px 10px 20px rgba(139, 115, 91, 0.1), inset 0px 2px 4px rgba(255,255,255,1); }
        .luxury-btn-dark { background: linear-gradient(145deg, #957d64, #7d6751); border: 1px solid rgba(255,255,255,0.2); box-shadow: 5px 10px 20px rgba(139, 115, 91, 0.2), inset 0px 2px 4px rgba(255,255,255,0.2); color: white; }
        .sidebar-item-active { background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, transparent 100%); border-left: 4px solid var(--accent); color: var(--accent); }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .font-serif { font-family: 'Cinzel', serif; }
        input[type="number"]::-webkit-inner-spin-button, input[type="date"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; }
        .label-micro { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4em; opacity: 0.35; }
        .data-macro { font-size: 38px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icons = {
            Dashboard: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>,
            History: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
            Shield: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Target: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Wallet: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            Calendar: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Repeat: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>,
            Close: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Layers: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            Zap: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        };

        const avatars = ["https://i.pravatar.cc/150?u=a042581f4e29026704d","https://i.pravatar.cc/150?u=a042581f4e29026024d","https://i.pravatar.cc/150?u=a04258114e29026702d"];

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [isMobileMode, setIsMobileMode] = useState(false);
            const [avatarIdx, setAvatarIdx] = useState(0);

            // Modal State
            const [newAmt, setNewAmt] = useState("");
            const [newDesc, setNewDesc] = useState("");
            const [newType, setNewType] = useState("expense"); 
            const [newSource, setNewSource] = useState("salary");
            const [newDueDate, setNewDueDate] = useState("");
            const [newInstallments, setNewInstallments] = useState(1);
            const [newDueDay, setNewDueDay] = useState(1);

            // Simulation State (Protocolos)
            const [simulatedProtocol, setSimulatedProtocol] = useState(null); // null means Auto
            const [simIncomeBoost, setSimIncomeBoost] = useState(0);
            const [simExpenseCut, setSimExpenseCut] = useState(0);

            useEffect(() => {
                const data = localStorage.getItem('finanzas_v9_luxury');
                if (data) setTransactions(JSON.parse(data));
                if (window.innerWidth < 768) setIsMobileMode(true);
                const handleResize = () => setIsMobileMode(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Core Financial Math
            const baseSalary = transactions.filter(t => t.type === 'income' && t.source === 'salary').reduce((a, b) => a + Number(b.amount), 0);
            const janluIncome = transactions.filter(t => t.source === 'janlu').reduce((a, b) => a + Number(b.amount), 0);
            const totalIncome = baseSalary + janluIncome;
            const currentExpenses = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.amount), 0);
            
            // Pending commitments sum (just for reference)
            const pendingCommitmentsAmount = transactions.filter(t => (t.type === 'commitment' || t.type === 'recurring') && !t.paid).reduce((a, b) => a + Number(b.amount), 0);

            // Simulated Values
            const effectiveIncome = totalIncome + Number(simIncomeBoost);
            const effectiveExpenses = Math.max(0, currentExpenses - Number(simExpenseCut));
            
            const liquidSurplus = effectiveIncome - effectiveExpenses;
            const sustainability = effectiveExpenses === 0 ? 100 : Math.min(100, Math.floor((baseSalary / effectiveExpenses) * 100));
            const peacePoint = 800 + (sustainability * 2) + Math.floor(liquidSurplus / 10000); // Pequeño bono por liquidez

            // Protocol Engine Auto-Detection
            const autoProtocol = useMemo(() => {
                if (effectiveExpenses > effectiveIncome) return 'EMERGENCIA';
                if (sustainability < 100 || liquidSurplus < 50000) return 'BLINDAJE';
                if (sustainability >= 100 && liquidSurplus >= 50000) return 'EXPANSION';
                return 'BLINDAJE';
            }, [effectiveIncome, effectiveExpenses, sustainability, liquidSurplus]);

            const activeProtocol = simulatedProtocol || autoProtocol;

            const pendingCommitments = useMemo(() => {
                return transactions.filter(t => (t.type === 'commitment' || t.type === 'recurring') && !t.paid).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            }, [transactions]);

            const handleSave = () => {
                if (!newAmt) return;
                let calculatedDueDate = newDueDate;
                if (newType === 'recurring') {
                    const today = new Date();
                    let targetDate = new Date(today.getFullYear(), today.getMonth(), newDueDay);
                    if (targetDate < today) targetDate.setMonth(targetDate.getMonth() + 1);
                    calculatedDueDate = targetDate.toISOString();
                }
                const entry = { 
                    id: Date.now(), amount: newAmt, description: newDesc, type: newType, source: newSource, date: new Date().toISOString(),
                    dueDate: calculatedDueDate, totalInstallments: newType === 'commitment' ? parseInt(newInstallments) : null,
                    currentInstallment: newType === 'commitment' ? 1 : null, dueDay: newType === 'recurring' ? parseInt(newDueDay) : null, paid: false
                };
                const newList = [entry, ...transactions];
                setTransactions(newList);
                localStorage.setItem('finanzas_v9_luxury', JSON.stringify(newList));
                setShowModal(false); setNewAmt(""); setNewDesc(""); setNewDueDate(""); setNewInstallments(1); setNewDueDay(1);
            };

            const markAsPaid = (id) => {
                let expenseEntry = null;
                const newList = transactions.map(t => {
                    if (t.id === id) {
                        expenseEntry = {
                            id: Date.now() + 1, amount: t.amount, description: t.type === 'recurring' ? `Pago Mensual: ${t.description}` : `Pago (Cuota ${t.currentInstallment}/${t.totalInstallments}): ${t.description}`,
                            type: 'expense', source: 'salary', date: new Date().toISOString()
                        };
                        if (t.type === 'commitment') {
                            if (t.currentInstallment < t.totalInstallments) {
                                const nextDate = new Date(t.dueDate); nextDate.setMonth(nextDate.getMonth() + 1);
                                return { ...t, currentInstallment: t.currentInstallment + 1, dueDate: nextDate.toISOString() };
                            } else { return { ...t, paid: true }; }
                        } else if (t.type === 'recurring') {
                            const nextDate = new Date(t.dueDate); nextDate.setMonth(nextDate.getMonth() + 1);
                            return { ...t, dueDate: nextDate.toISOString() };
                        }
                    }
                    return t;
                });
                const finalTransactions = expenseEntry ? [expenseEntry, ...newList] : newList;
                setTransactions(finalTransactions);
                localStorage.setItem('finanzas_v9_luxury', JSON.stringify(finalTransactions));
            };

            const editAmount = (id, currentAmount, desc) => {
                const newVal = prompt(`Actualizar tarifa para ${desc}:`, currentAmount);
                if (newVal && !isNaN(newVal)) {
                    const newList = transactions.map(t => t.id === id ? { ...t, amount: parseFloat(newVal) } : t);
                    setTransactions(newList); localStorage.setItem('finanzas_v9_luxury', JSON.stringify(newList));
                }
            };

            return (
                <div className="h-screen w-screen flex bg-[#F2EDE4] overflow-hidden text-[#4A443F]">
                    
                    {/* --- SIDEBAR --- */}
                    <aside className="w-72 bg-[rgba(232,223,209,0.3)] border-r border-white/40 flex flex-col py-12 z-10 relative backdrop-blur-xl">
                        <div className="px-12 mb-20 flex flex-col gap-2">
                            <div className="flex items-center gap-4 mb-4">
                                <div className="w-10 h-10 bg-white rounded-xl shadow-md flex items-center justify-center text-[#8B735B]"><Icons.Shield /></div>
                                <span className="font-serif text-xl font-bold tracking-widest text-[#8B735B]">CASA</span>
                            </div>
                            {/* ACTIVE PROTOCOL BADGE IN SIDEBAR */}
                            <div className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-[0.2em] shadow-sm border border-white/50 inline-flex items-center gap-2
                                ${activeProtocol === 'EMERGENCIA' ? 'bg-red-500/10 text-red-700' : 
                                  activeProtocol === 'BLINDAJE' ? 'bg-[#8B735B]/10 text-[#8B735B]' : 
                                  'bg-green-500/10 text-green-700'}`}>
                                <Icons.Zap /> PROTOCOLO: {activeProtocol}
                            </div>
                        </div>
                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'dashboard', l: 'Panel Central', Icon: Icons.Dashboard },
                                { id: 'registros', l: 'Historial', Icon: Icons.History },
                                { id: 'protocolos', l: 'Centro Táctico', Icon: Icons.Target }
                            ].map(m => (
                                <motion.div key={m.id} whileHover={{ x: 4 }} onClick={() => setView(m.id)} className={`px-12 py-5 flex items-center gap-5 cursor-pointer transition-colors ${view === m.id ? 'sidebar-item-active' : 'opacity-40 hover:opacity-100'}`}>
                                    <m.Icon /><span className="text-[11px] font-black uppercase tracking-widest">{m.l}</span>
                                </motion.div>
                            ))}
                        </nav>
                    </aside>

                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 p-20 overflow-y-auto custom-scrollbar relative">
                        <header className="flex justify-between items-center mb-20 max-w-6xl mx-auto">
                            <div>
                                <h1 className="text-[10px] font-black uppercase tracking-[0.6em] opacity-30 mb-2">Comando Financiero</h1>
                                <h2 className="text-4xl font-serif opacity-90">
                                    {view === 'dashboard' ? 'Resumen Ejecutivo' : view === 'registros' ? 'Libro Mayor' : 'Centro de Operaciones Tácticas'}
                                </h2>
                            </div>
                            <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }} onClick={() => setShowModal(true)} className="luxury-btn-dark px-10 py-4 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-3">
                                <Icons.Wallet /><span>Nuevo Registro</span>
                            </motion.button>
                        </header>

                        <div className="max-w-6xl mx-auto">
                            
                            {/* -------------------- VIEW: PROTOCOLOS (CENTRO TÁCTICO) -------------------- */}
                            {view === 'protocolos' && (
                                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="space-y-10">
                                    
                                    {/* SIMULADOR PANEL */}
                                    <div className="luxury-card p-12 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-white/40 rounded-full blur-3xl -mr-20 -mt-20"></div>
                                        <div className="flex justify-between items-end relative z-10 mb-10">
                                            <div>
                                                <p className="label-micro text-[#8B735B]">Simulador de Escenarios</p>
                                                <h3 className="text-4xl font-black mt-2 tracking-tighter">Proyecciones</h3>
                                            </div>
                                            <div className="flex gap-4">
                                                <button onClick={() => setSimulatedProtocol('EMERGENCIA')} className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${activeProtocol === 'EMERGENCIA' ? 'bg-red-500 text-white shadow-lg' : 'bg-white/50 text-[#4A443F]/50 hover:bg-white'}`}>Emergencia</button>
                                                <button onClick={() => setSimulatedProtocol('BLINDAJE')} className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${activeProtocol === 'BLINDAJE' ? 'bg-[#8B735B] text-white shadow-lg' : 'bg-white/50 text-[#4A443F]/50 hover:bg-white'}`}>Blindaje</button>
                                                <button onClick={() => setSimulatedProtocol('EXPANSION')} className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${activeProtocol === 'EXPANSION' ? 'bg-green-600 text-white shadow-lg' : 'bg-white/50 text-[#4A443F]/50 hover:bg-white'}`}>Expansión</button>
                                                {simulatedProtocol !== null && (
                                                    <button onClick={() => { setSimulatedProtocol(null); setSimIncomeBoost(0); setSimExpenseCut(0); }} className="px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest bg-black/10 text-black/50 hover:bg-black/20 transition-all">Restaurar Auto</button>
                                                )}
                                            </div>
                                        </div>

                                        {/* FINANCIAL STATE CALCULATION */}
                                        <div className="grid grid-cols-3 gap-8 mb-10">
                                            <div className="bg-white/40 p-8 rounded-3xl border border-white/60">
                                                <p className="label-micro">Ingreso Total (+ Simulado)</p>
                                                <p className="text-3xl font-black text-green-700 mt-2">${effectiveIncome.toLocaleString()}</p>
                                                <input type="range" min="0" max="500000" step="10000" value={simIncomeBoost} onChange={(e)=>setSimIncomeBoost(e.target.value)} className="w-full mt-4 opacity-30 hover:opacity-100 transition-opacity" />
                                                <p className="text-[9px] font-bold text-green-700 mt-1">+{Number(simIncomeBoost).toLocaleString()} extra simulado</p>
                                            </div>
                                            <div className="bg-white/40 p-8 rounded-3xl border border-white/60">
                                                <p className="label-micro">Egresos (- Recortes)</p>
                                                <p className="text-3xl font-black text-red-600 mt-2">${effectiveExpenses.toLocaleString()}</p>
                                                <input type="range" min="0" max={currentExpenses} step="10000" value={simExpenseCut} onChange={(e)=>setSimExpenseCut(e.target.value)} className="w-full mt-4 opacity-30 hover:opacity-100 transition-opacity" />
                                                <p className="text-[9px] font-bold text-red-600 mt-1">-{Number(simExpenseCut).toLocaleString()} recorte simulado</p>
                                            </div>
                                            <div className={`p-8 rounded-3xl border border-white/60 text-white shadow-xl ${liquidSurplus > 0 ? 'bg-gradient-to-br from-[#8B735B] to-[#4A443F]' : 'bg-gradient-to-br from-red-500 to-red-800'}`}>
                                                <p className="text-[9px] font-black uppercase tracking-[0.4em] opacity-60">Excedente Líquido</p>
                                                <p className="text-4xl font-black mt-2">${liquidSurplus.toLocaleString()}</p>
                                                <p className="text-[10px] opacity-60 mt-4">Capital disponible para ejecutar directrices tácticas.</p>
                                            </div>
                                        </div>

                                        {/* PROTOCOL INSTRUCTION / PROJECTIONS */}
                                        <div className="bg-white/80 rounded-[32px] p-10 border-2 border-white">
                                            <div className="flex items-center gap-4 mb-6">
                                                <Icons.Target />
                                                <h4 className="text-2xl font-serif">Directrices de Capital (Modo {activeProtocol})</h4>
                                            </div>
                                            
                                            {activeProtocol === 'EMERGENCIA' && (
                                                <div className="space-y-4">
                                                    <p className="text-red-700 font-bold mb-4">ALERTA: Flujo de caja negativo. La supervivencia del búnker está comprometida.</p>
                                                    <div className="bg-red-50 p-6 rounded-2xl border border-red-100 flex justify-between items-center">
                                                        <span className="font-bold text-sm">Recorte Inmediato Requerido:</span>
                                                        <span className="text-2xl font-black text-red-700">${Math.abs(liquidSurplus).toLocaleString()}</span>
                                                    </div>
                                                    <p className="text-xs opacity-60 mt-2 italic">» Acción: Cero inyecciones a JANLU. Congelar tarjeta de crédito. Reducir suscripciones.</p>
                                                </div>
                                            )}

                                            {activeProtocol === 'BLINDAJE' && liquidSurplus > 0 && (
                                                <div className="space-y-4">
                                                    <p className="text-[#8B735B] font-bold mb-4">El objetivo primordial es generar una reserva vital intocable.</p>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="bg-white p-6 rounded-2xl border border-black/5">
                                                            <p className="label-micro">Fondo de Emergencia (80%)</p>
                                                            <p className="text-3xl font-black text-[#8B735B] mt-2">${(liquidSurplus * 0.8).toLocaleString()}</p>
                                                        </div>
                                                        <div className="bg-white p-6 rounded-2xl border border-black/5">
                                                            <p className="label-micro">Caja Operativa (20%)</p>
                                                            <p className="text-3xl font-black text-[#4A443F] mt-2">${(liquidSurplus * 0.2).toLocaleString()}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {activeProtocol === 'EXPANSION' && liquidSurplus > 0 && (
                                                <div className="space-y-4">
                                                    <p className="text-green-700 font-bold mb-4">Búnker asegurado. Se autoriza la aceleración de patrimonio y negocios.</p>
                                                    <div className="grid grid-cols-3 gap-4">
                                                        <div className="bg-white p-6 rounded-2xl border border-green-100">
                                                            <p className="label-micro">Inyección JANLU (50%)</p>
                                                            <p className="text-3xl font-black text-orange-600 mt-2">${(liquidSurplus * 0.5).toLocaleString()}</p>
                                                        </div>
                                                        <div className="bg-white p-6 rounded-2xl border border-black/5">
                                                            <p className="label-micro">Inversión Externa (30%)</p>
                                                            <p className="text-3xl font-black text-[#8B735B] mt-2">${(liquidSurplus * 0.3).toLocaleString()}</p>
                                                        </div>
                                                        <div className="bg-white p-6 rounded-2xl border border-black/5">
                                                            <p className="label-micro">Disfrute Libre (20%)</p>
                                                            <p className="text-3xl font-black text-[#4A443F] mt-2">${(liquidSurplus * 0.2).toLocaleString()}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* -------------------- VIEW: DASHBOARD -------------------- */}
                            {view === 'dashboard' && (
                                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} transition={{duration:0.6}} className="flex flex-col items-center">
                                    <div className="relative w-[450px] h-[450px] flex items-center justify-center mb-10">
                                        <div className="absolute inset-0 bg-white/20 rounded-full blur-3xl scale-90"></div>
                                        <svg width="450" height="450" className="transform -rotate-90 relative z-10">
                                            <circle cx="225" cy="225" r="200" fill="transparent" stroke="rgba(255, 255, 255, 0.6)" strokeWidth="30" />
                                            <circle cx="225" cy="225" r="200" fill="transparent" stroke="rgba(139, 115, 91, 0.05)" strokeWidth="30" />
                                            <circle cx="225" cy="225" r="200" fill="transparent" stroke={sustainability >= 100 ? '#9BB095' : '#D9A852'} strokeWidth="30" strokeDasharray="1256" strokeDashoffset={1256 - (1256 * (Math.min(100, sustainability)/100))} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center z-20 mt-4">
                                            <span className="label-micro mb-2">Peace Point</span>
                                            <h2 className="text-[120px] font-black tracking-tighter leading-none text-[#4A443F] drop-shadow-sm">{peacePoint}</h2>
                                            <div className="mt-6 px-5 py-2 bg-white/60 backdrop-blur-md rounded-full border border-white shadow-sm flex items-center gap-2">
                                                <div className={`w-2 h-2 rounded-full ${sustainability >= 100 ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                                <span className={`text-[9px] font-black uppercase tracking-widest ${sustainability >= 100 ? 'text-green-700' : 'text-red-700'}`}>Sostenibilidad {sustainability}%</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-12 gap-10 w-full mt-10">
                                        <div className="col-span-8 grid grid-cols-2 gap-6">
                                            <motion.div whileHover={{ y: -5 }} className="luxury-card p-10 flex flex-col justify-between h-48">
                                                <p className="label-micro">Gastos Totales</p>
                                                <p className="data-macro text-[#4A443F]">${currentExpenses.toLocaleString()}</p>
                                            </motion.div>
                                            <motion.div whileHover={{ y: -5 }} className="luxury-card p-10 flex flex-col justify-between h-48">
                                                <p className="label-micro">Ingreso Neto Base</p>
                                                <p className="data-macro text-[#9BB095]">${baseSalary.toLocaleString()}</p>
                                            </motion.div>
                                            <motion.div whileHover={{ y: -5 }} className="luxury-card p-10 flex flex-col justify-between h-48 col-span-2 relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-orange-100/50 rounded-full blur-3xl -mr-10 -mt-10"></div>
                                                <div className="flex justify-between items-end relative z-10">
                                                    <div>
                                                        <p className="label-micro text-orange-800/50">Inyecciones JANLU</p>
                                                        <p className="data-macro text-[#C88566] mt-4">${janluIncome.toLocaleString()}</p>
                                                    </div>
                                                    <div className="w-12 h-12 bg-white/50 rounded-full flex items-center justify-center text-orange-500"><Icons.Target /></div>
                                                </div>
                                            </motion.div>
                                        </div>
                                        <div className="col-span-4 luxury-card p-8 flex flex-col">
                                            <div className="flex justify-between items-center mb-6">
                                                <p className="label-micro">Agenda de Pagos</p>
                                                <Icons.Calendar />
                                            </div>
                                            <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2">
                                                {pendingCommitments.length === 0 ? (
                                                    <div className="h-full flex flex-col items-center justify-center opacity-30 text-center"><Icons.Shield /><p className="text-[10px] font-black uppercase tracking-widest mt-4">Todo al día</p></div>
                                                ) : (
                                                    pendingCommitments.map(t => (
                                                        <div key={t.id} className="bg-white/40 p-5 rounded-2xl border border-white/50 hover:bg-white/60 transition-colors group">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <p className="font-bold text-sm leading-tight text-[#4A443F] flex items-center gap-2">{t.type === 'recurring' && <Icons.Repeat />}{t.description}</p>
                                                                <div className="flex items-center gap-2">
                                                                    {t.type === 'recurring' && <button onClick={() => editAmount(t.id, t.amount, t.description)} className="w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 hover:bg-orange-100 hover:text-orange-600 transition-all flex items-center justify-center"><Icons.Edit /></button>}
                                                                    <button onClick={() => markAsPaid(t.id)} className="w-6 h-6 rounded-full bg-[#E8DFD1] hover:bg-green-500 hover:text-white transition-colors flex items-center justify-center text-transparent flex-shrink-0"><Icons.Check /></button>
                                                                </div>
                                                            </div>
                                                            <div className="flex justify-between items-end">
                                                                <div>
                                                                    <p className="text-[9px] font-black uppercase text-red-500 tracking-wider">Vence: {new Date(t.dueDate).toLocaleDateString()}</p>
                                                                    {t.type === 'commitment' && t.totalInstallments > 1 && <p className="text-[8px] font-black uppercase tracking-[0.2em] opacity-50 mt-1">CUOTA {t.currentInstallment} DE {t.totalInstallments}</p>}
                                                                </div>
                                                                <p className="font-black text-lg text-[#4A443F]">${Number(t.amount).toLocaleString()}</p>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* -------------------- VIEW: REGISTROS -------------------- */}
                            {view === 'registros' && (
                                <motion.div initial={{opacity:0}} animate={{opacity:1}} className="space-y-6">
                                    {transactions.map((t, i) => (
                                        <motion.div key={t.id} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.05 }} className={`luxury-card p-8 flex justify-between items-center hover:bg-white/70 transition-colors cursor-default ${t.type === 'commitment' || t.type === 'recurring' ? 'border-orange-200/50' : ''}`}>
                                            <div className="flex items-center gap-6">
                                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-sm border border-white ${t.type === 'income' ? 'bg-green-50 text-green-600' : (t.type === 'commitment' || t.type === 'recurring') ? 'bg-orange-50 text-orange-500' : 'bg-red-50 text-red-500'}`}>
                                                    {t.type === 'income' ? <Icons.Home /> : t.type === 'recurring' ? <Icons.Repeat /> : t.type === 'commitment' ? <Icons.Calendar /> : <Icons.Wallet />}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-xl tracking-tight">{t.description || 'Movimiento no especificado'}</p>
                                                    <p className="label-micro mt-1">{t.type === 'commitment' ? (t.paid ? 'DEUDA SALDADA' : `VENCE EL ${new Date(t.dueDate).toLocaleDateString()}`) : t.type === 'recurring' ? 'SUSCRIPCIÓN / SERVICIO FIJO' : t.source === 'janlu' ? 'Aporte de JANLU' : 'Flujo Vital'}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className={`text-3xl font-black tracking-tighter ${t.type === 'income' ? 'text-[#9BB095]' : (t.type === 'commitment' || t.type === 'recurring') && !t.paid ? 'text-orange-500' : 'text-[#4A443F]'}`}>
                                                    {t.type === 'income' ? '+' : (t.type === 'commitment' || t.type === 'recurring') ? '!' : '-'}${Number(t.amount).toLocaleString()}
                                                </p>
                                                <p className="label-micro mt-2">{new Date(t.date).toLocaleDateString()}</p>
                                            </div>
                                        </motion.div>
                                    ))}
                                </motion.div>
                            )}
                        </div>
                    </main>

                    {/* --- SMART MODAL --- */}
                    <AnimatePresence>
                        {showModal && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="fixed inset-0 bg-[#F2EDE4]/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                                <motion.div initial={{y:50, scale:0.95}} animate={{y:0, scale:1}} exit={{y:20, opacity:0}} className={`luxury-card flex flex-col relative overflow-hidden ${isMobileMode ? 'w-[390px] h-[800px] p-10 border-[10px] border-[#E8DFD1]' : 'w-full max-w-4xl p-16'}`}>
                                    <button onClick={()=>setShowModal(false)} className="absolute top-8 right-8 w-12 h-12 flex items-center justify-center rounded-full bg-white/40 hover:bg-white/80 transition-all text-[#4A443F]"><Icons.Close /></button>
                                    <div className={`flex ${isMobileMode ? 'flex-col text-center mt-10' : 'justify-between items-end border-b border-black/5 pb-12'}`}>
                                        <div className={isMobileMode ? 'w-full mb-8' : 'w-1/2 pr-10 border-r border-black/5'}>
                                            <p className="label-micro mb-4">{newType === 'commitment' ? 'Valor por Cuota' : newType === 'recurring' ? 'Tarifa Mensual' : 'Monto Exacto'}</p>
                                            <input type="number" value={newAmt} onChange={e=>setNewAmt(e.target.value)} className={`font-light bg-transparent outline-none w-full tracking-tighter text-[#4A443F] placeholder:opacity-20 ${isMobileMode ? 'text-6xl text-center' : 'text-8xl'}`} placeholder="0.00" autoFocus />
                                        </div>
                                        <div className={isMobileMode ? 'w-full' : 'w-1/2 pl-10'}>
                                            <p className="label-micro mb-4">Concepto / Proveedor</p>
                                            <input type="text" value={newDesc} onChange={e=>setNewDesc(e.target.value)} className={`font-bold bg-transparent border-b border-black/10 outline-none w-full text-[#4A443F] placeholder:opacity-30 pb-2 ${isMobileMode ? 'text-xl text-center' : 'text-3xl'}`} placeholder="Ej: Internet / Netflix" />
                                        </div>
                                    </div>
                                    <div className={`grid ${isMobileMode ? 'grid-cols-1 mt-10' : 'grid-cols-4 mt-12'} gap-4`}>
                                        <div className="col-span-4 mb-2"><p className={`label-micro ${isMobileMode ? 'text-center' : ''}`}>Naturaleza del Flujo</p></div>
                                        <button onClick={()=>setNewType('expense')} className={`py-5 rounded-[20px] font-black text-[9px] uppercase tracking-widest transition-all ${newType==='expense' ? 'luxury-btn-dark' : 'luxury-btn text-[#4A443F]/40'}`}>Egreso Único</button>
                                        <button onClick={()=>setNewType('income')} className={`py-5 rounded-[20px] font-black text-[9px] uppercase tracking-widest transition-all ${newType==='income' ? 'bg-gradient-to-br from-[#9BB095] to-[#7A8F74] text-white shadow-md border border-white/20' : 'luxury-btn text-[#4A443F]/40'}`}>Ingreso</button>
                                        <button onClick={()=>setNewType('commitment')} className={`py-5 rounded-[20px] font-black text-[9px] uppercase tracking-widest transition-all ${newType==='commitment' ? 'bg-gradient-to-br from-orange-400 to-orange-600 text-white shadow-md border border-white/20' : 'luxury-btn text-[#4A443F]/40'}`}>Deuda a Cuotas</button>
                                        <button onClick={()=>setNewType('recurring')} className={`py-5 rounded-[20px] font-black text-[9px] uppercase tracking-widest transition-all ${newType==='recurring' ? 'bg-gradient-to-br from-[#4A443F] to-[#2A241F] text-white shadow-md border border-white/20' : 'luxury-btn text-[#4A443F]/40 flex items-center justify-center gap-2'}`}>{newType==='recurring' && <Icons.Repeat />} Fijo Mensual</button>
                                    </div>
                                    <div className="mt-8">
                                        <AnimatePresence mode="wait">
                                            {newType === 'commitment' ? (
                                                <motion.div key="date-input" initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-20}} className="grid grid-cols-2 gap-4">
                                                    <div><p className={`label-micro mb-5 ${isMobileMode ? 'text-center' : ''}`}>Vencimiento</p><div className="luxury-btn py-4 px-6 rounded-[24px] flex items-center justify-between"><input type="date" value={newDueDate} onChange={e=>setNewDueDate(e.target.value)} className="bg-transparent outline-none w-full font-bold text-lg text-[#4A443F] text-center" /></div></div>
                                                    <div><p className={`label-micro mb-5 ${isMobileMode ? 'text-center' : ''}`}>Cant. Cuotas</p><div className="luxury-btn py-4 px-6 rounded-[24px] flex items-center justify-between"><input type="number" min="1" max="72" value={newInstallments} onChange={e=>setNewInstallments(e.target.value)} className="bg-transparent outline-none w-full font-bold text-lg text-[#4A443F] text-center" /><Icons.Layers /></div></div>
                                                </motion.div>
                                            ) : newType === 'recurring' ? (
                                                <motion.div key="recurring-input" initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-20}} className="w-1/2">
                                                    <p className={`label-micro mb-5 ${isMobileMode ? 'text-center' : ''}`}>¿Qué día del mes vence?</p>
                                                    <div className="luxury-btn py-4 px-6 rounded-[24px] flex items-center justify-between"><span className="font-bold opacity-40">Día</span><input type="number" min="1" max="31" value={newDueDay} onChange={e=>setNewDueDay(e.target.value)} className="bg-transparent outline-none w-20 font-bold text-xl text-[#4A443F] text-center" /><Icons.Repeat /></div>
                                                </motion.div>
                                            ) : (
                                                <motion.div key="source-input" initial={{opacity:0, x:-20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:20}} className="space-y-5">
                                                    <p className={`label-micro ${isMobileMode ? 'text-center' : ''}`}>Origen de Fondos</p>
                                                    <div className="flex gap-4">
                                                        <button onClick={()=>setNewSource('salary')} className={`flex-1 py-5 rounded-[20px] font-black text-[10px] uppercase tracking-widest transition-all ${newSource==='salary' ? 'luxury-btn-dark' : 'luxury-btn text-[#4A443F]/40'}`}>Base Hogar</button>
                                                        <button onClick={()=>setNewSource('janlu')} className={`flex-1 py-5 rounded-[20px] font-black text-[10px] uppercase tracking-widest transition-all ${newSource==='janlu' ? 'bg-gradient-to-br from-[#D9A852] to-[#B88A44] text-white shadow-md border border-white/20' : 'luxury-btn text-[#4A443F]/40'}`}>Capital JANLU</button>
                                                    </div>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                    <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={handleSave} className={`w-full py-8 luxury-btn-dark rounded-[32px] font-black text-xs uppercase tracking-[0.3em] mt-auto`}>
                                        {newType === 'commitment' ? `Registrar Deuda` : newType === 'recurring' ? 'Activar Suscripción' : 'Registrar Movimiento'}
                                    </motion.button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
