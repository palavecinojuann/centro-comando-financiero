<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando Financiero | Búnker Bimont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F2EDE4;
            color: #4A443F;
            margin: 0;
            overflow: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(139, 115, 91, 0.2);
            border-radius: 10px;
        }
        .font-serif {
            font-family: 'Outfit', serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- ICONOS SIMULADOS (Lucide-like) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
                ledger: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                manager: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>,
                simulator: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m16 10-4 4-4-4"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5v14"/></svg>,
                bell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
                shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
                heart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
                search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            };
            return <div className={className}>{icons[name] || icons.dashboard}</div>;
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeMode, setActiveMode] = useState('blindaje');
            const peacePoint = 820;

            const CategoryPill = ({ label }) => {
                const colors = {
                    Freelance: 'bg-blue-100 text-blue-700',
                    Groceries: 'bg-green-100 text-green-700',
                    Housing: 'bg-purple-100 text-purple-700',
                    Dining: 'bg-orange-100 text-orange-700'
                };
                return <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${colors[label] || 'bg-gray-100 text-gray-700'}`}>{label}</span>;
            };

            return (
                <div className="min-h-screen flex">
                    {/* SIDEBAR */}
                    <aside className="w-24 bg-[#E8DFD1]/50 backdrop-blur-xl border-r border-white/20 flex flex-col items-center py-8 z-20">
                        <div className="mb-12 opacity-40">
                            <Icon name="dashboard" size={28} />
                        </div>
                        <div className="flex-1 flex flex-col gap-4">
                            {[
                                { id: 'dashboard', label: 'Resumen', icon: 'dashboard' },
                                { id: 'ledger', label: 'Ledger', icon: 'ledger' },
                                { id: 'manager', label: 'Manager', icon: 'manager' },
                                { id: 'simulator', label: 'Simulador', icon: 'simulator' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setCurrentView(item.id)} className={`flex flex-col items-center gap-1 p-4 transition-all ${currentView === item.id ? 'text-[#8B735B]' : 'text-[#4A443F]/40 hover:text-[#4A443F]'}`}>
                                    <div className={`p-3 rounded-2xl transition-all ${currentView === item.id ? 'bg-white shadow-lg' : ''}`}>
                                        <Icon name={item.icon} />
                                    </div>
                                    <span className="text-[10px] font-bold uppercase tracking-wider">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 relative overflow-y-auto custom-scrollbar">
                        <header className="px-8 py-6 flex justify-between items-center sticky top-0 bg-[#F2EDE4]/80 backdrop-blur-md z-10">
                            <h1 className="text-xl font-bold uppercase tracking-widest opacity-80 font-serif">
                                {currentView === 'dashboard' ? 'Command Center' : 
                                 currentView === 'ledger' ? 'October 2023 - Financial Ledger' :
                                 currentView === 'manager' ? 'Financial Dashboard - Manager View' : 
                                 'Capital Distribution Simulator'}
                            </h1>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="font-bold text-xs">Josein Poldea</p>
                                    <p className="text-[9px] opacity-40 uppercase font-bold tracking-widest">SW 7537</p>
                                </div>
                                <img src="https://i.pravatar.cc/150?u=josein" className="w-10 h-10 rounded-full border-2 border-white shadow-sm" />
                            </div>
                        </header>

                        <AnimatePresence mode="wait">
                            {currentView === 'dashboard' && (
                                <motion.div key="dash" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="px-8 pb-12 space-y-12">
                                    <section className="flex flex-col items-center justify-center pt-4">
                                        <div className="relative w-[380px] h-[380px] flex items-center justify-center">
                                            <svg width="380" height="380" className="transform -rotate-90">
                                                <circle cx="190" cy="190" r="150" fill="transparent" stroke="rgba(139, 115, 91, 0.05)" strokeWidth="45" />
                                                <circle cx="190" cy="190" r="150" fill="transparent" stroke="#9BB095" strokeWidth="45" strokeDasharray="100 800" strokeDashoffset="0" strokeLinecap="round" />
                                                <circle cx="190" cy="190" r="150" fill="transparent" stroke="#C88566" strokeWidth="45" strokeDasharray="200 700" strokeDashoffset="-110" strokeLinecap="round" />
                                                <circle cx="190" cy="190" r="150" fill="transparent" stroke="#D9A852" strokeWidth="45" strokeDasharray="150 750" strokeDashoffset="-320" strokeLinecap="round" />
                                            </svg>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                                                <p className="text-xs opacity-40 font-bold uppercase tracking-widest">Peace Point</p>
                                                <h2 className="text-8xl font-bold tracking-tighter leading-none">{peacePoint}</h2>
                                                <p className="text-[9px] uppercase font-bold tracking-[0.2em] opacity-30 mt-2">Financial Security Score</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 mt-12">
                                            {[
                                                { id: 'blindaje', label: 'Modo Blindaje', icon: 'shield' },
                                                { id: 'expansion', label: 'Modo Expansión', icon: 'zap' },
                                                { id: 'disfrute', label: 'Modo Disfrute', icon: 'heart' }
                                            ].map(mode => (
                                                <button key={mode.id} onClick={() => setActiveMode(mode.id)} className={`px-8 py-4 rounded-full flex items-center gap-3 transition-all shadow-sm border ${activeMode === mode.id ? 'bg-white border-[#8B735B]/20 scale-105' : 'bg-transparent border-transparent opacity-40'}`}>
                                                    <Icon name={mode.icon} size={18} className={activeMode === mode.id ? 'text-[#8B735B]' : ''} />
                                                    <span className="text-xs font-bold">{mode.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                    <section className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white rounded-[32px] p-6 shadow-sm border border-white/50">
                                            <p className="text-[10px] uppercase font-bold opacity-30 mb-1">Total en Cuentas</p>
                                            <p className="text-2xl font-bold">$ 117.364,00</p>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-6 shadow-sm border border-white/50">
                                            <p className="text-[10px] uppercase font-bold opacity-30 mb-1">Crecimiento</p>
                                            <p className="text-2xl font-bold text-green-600">+0,08% ↗</p>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-6 shadow-sm border border-white/50">
                                            <p className="text-[10px] uppercase font-bold opacity-30 mb-1">Pagos</p>
                                            <p className="text-sm font-bold">22 de poso</p>
                                            <p className="text-sm font-bold">25 de uso</p>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-6 shadow-sm border border-white/50">
                                            <p className="text-[10px] uppercase font-bold opacity-30 mb-1">Alertas</p>
                                            <div className="flex items-center gap-2 text-2xl font-bold">#1 <span className="text-orange-500">!</span></div>
                                        </div>
                                    </section>
                                </motion.div>
                            )}

                            {currentView === 'ledger' && (
                                <motion.div key="ledger" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="px-8 flex gap-8">
                                    <div className="flex-1 bg-white/60 rounded-[32px] p-8 shadow-sm border border-white/50">
                                        <table className="w-full text-left">
                                            <thead className="text-[10px] uppercase font-bold opacity-30 border-b border-black/5">
                                                <tr><th className="pb-4">Date</th><th className="pb-4">Description</th><th className="pb-4">Category</th><th className="pb-4">Amount</th></tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {[
                                                    { d: 'Oct 18', desc: 'Client Payment', cat: 'Freelance', amt: '+$1,250', pos: true },
                                                    { d: 'Oct 18', desc: 'Grocery Trip', cat: 'Groceries', amt: '-$168', pos: false },
                                                    { d: 'Oct 17', desc: 'Rent Payment', cat: 'Housing', amt: '-$2,100', pos: false }
                                                ].map((row, i) => (
                                                    <tr key={i} className="border-b border-black/5">
                                                        <td className="py-6 opacity-60">{row.d}</td>
                                                        <td className="py-6 font-bold">{row.desc}</td>
                                                        <td className="py-6"><CategoryPill label={row.cat} /></td>
                                                        <td className={`py-6 font-bold ${row.pos ? 'text-green-600' : 'text-red-500'}`}>{row.amt}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <aside className="w-72 space-y-6">
                                        <div className="bg-white/80 rounded-[32px] p-8 shadow-sm border border-white">
                                            <h3 className="font-bold mb-6">Overview</h3>
                                            <div className="space-y-4">
                                                <div><p className="text-[10px] font-bold opacity-30 uppercase">Income</p><p className="text-xl font-bold text-green-600">$6,100</p></div>
                                                <div><p className="text-[10px] font-bold opacity-30 uppercase">Expenses</p><p className="text-xl font-bold text-red-500">$2,442</p></div>
                                            </div>
                                        </div>
                                    </aside>
                                </motion.div>
                            )}

                            {currentView === 'manager' && (
                                <motion.div key="manager" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="px-8 pb-12 space-y-8">
                                    <div className="grid grid-cols-4 gap-6">
                                        {['Budget', 'Spending', 'Remaining', 'Progress'].map(l => (
                                            <div key={l} className="bg-white rounded-3xl p-6 border border-white shadow-sm">
                                                <p className="text-[10px] font-bold opacity-30 uppercase">{l}</p>
                                                <p className="text-lg font-bold">Value</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="bg-white rounded-[32px] p-8 h-64 flex flex-col border border-white">
                                            <h3 className="font-bold text-sm mb-4">Budget vs Actual</h3>
                                            <div className="flex-1 border-b border-black/5 flex items-end">
                                                <svg className="w-full h-full opacity-20" viewBox="0 0 400 100" preserveAspectRatio="none">
                                                    <path d="M0,80 Q50,20 100,50 T200,30 T300,60 T400,20" fill="none" stroke="#8B735B" strokeWidth="4" />
                                                </svg>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-8 h-64 flex flex-col border border-white">
                                            <h3 className="font-bold text-sm mb-4">Spend Variance</h3>
                                            <div className="flex-1 flex justify-around items-end">
                                                {[40, 70, 30, 90].map((h, i) => (
                                                    <div key={i} className="w-4 bg-[#8B735B]/40 rounded-t-sm" style={{ height: `${h}%` }}></div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {currentView === 'simulator' && (
                                <motion.div key="sim" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="p-12">
                                    <div className="grid grid-cols-3 gap-12 max-w-4xl mx-auto">
                                        {['Conservative', 'Growth', 'Aggressive'].map((l, i) => (
                                            <div key={l} className="bg-white/40 rounded-[48px] p-10 flex flex-col items-center gap-8 border border-white shadow-sm">
                                                <h3 className="font-bold">{l}</h3>
                                                <div className="h-80 w-20 bg-[#F2EDE4] rounded-full relative p-2 shadow-inner">
                                                    <div className="absolute bottom-2 left-2 right-2 rounded-full bg-[#8B735B]" style={{ height: i === 0 ? '30%' : i === 1 ? '50%' : '20%' }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        {/* FAB */}
                        <button onClick={() => setCurrentView('nuevo-gasto')} className="fixed bottom-12 right-12 w-16 h-16 bg-[#8B735B] text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
                            <Icon name="plus" size={32} />
                        </button>

                        {/* MOBILE GASTO MODAL */}
                        <AnimatePresence>
                            {currentView === 'nuevo-gasto' && (
                                <motion.div key="modal" initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} className="fixed inset-0 bg-[#F2EDE4] z-[100] flex items-center justify-center p-4">
                                    <div className="max-w-md w-full bg-white rounded-[60px] p-12 shadow-2xl relative overflow-hidden space-y-12">
                                        <button onClick={() => setCurrentView('dashboard')} className="absolute top-10 left-10 text-3xl opacity-20 hover:opacity-100 transition-all">←</button>
                                        <header className="text-center pt-4">
                                            <p className="text-sm font-bold opacity-60">Añadir Gasto</p>
                                            <div className="mt-8">
                                                <h2 className="text-7xl font-light tracking-tighter">€ 145.50</h2>
                                                <p className="text-[10px] opacity-40 uppercase font-black tracking-widest mt-3">01 may 2024 • 14:32</p>
                                            </div>
                                        </header>
                                        <div className="grid grid-cols-3 gap-4">
                                            {['📖', '🏠', '🚚', '🌱', '🍸'].map((c, i) => (
                                                <button key={i} className={`p-5 rounded-[32px] flex flex-col items-center gap-2 ${i === 1 ? 'bg-white shadow-xl ring-2 ring-[#8B735B]/10' : 'bg-[#F2EDE4]/40'}`}>
                                                    <span className="text-3xl">{c}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <button className="w-full py-6 rounded-full bg-[#E8DFD1] text-[#8B735B] font-black text-lg shadow-xl shadow-[#8B735B]/10 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-widest">Confirmar Gasto</button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
