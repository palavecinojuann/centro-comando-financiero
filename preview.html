<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas del Hogar | Prototipo Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F2EDE4; color: #4A443F; margin: 0; }
        .font-serif { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .neu-shadow { box-shadow: 20px 20px 60px #ded9d1, -20px -20px 60px #ffffff; }
        .inner-shadow { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139, 115, 91, 0.2); border-radius: 10px; }
    </style>
</head>
<body className="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 24 }) => {
            const icons = {
                dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
                ledger: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
                wallet: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>,
                shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            };
            return icons[name] || icons.dashboard;
        };

        const App = () => {
            const [mode, setMode] = useState('desktop'); // 'desktop' or 'mobile'
            const sustainability = 85;

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    {/* Botón Switcher */}
                    <button 
                        onClick={() => setMode(mode === 'desktop' ? 'mobile' : 'desktop')}
                        className="fixed top-8 right-8 z-50 bg-[#8B735B] text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 hover:scale-110 transition-all font-black text-xs uppercase tracking-widest"
                    >
                        <Icon name={mode === 'desktop' ? 'phone' : 'dashboard'} size={16} />
                        {mode === 'desktop' ? 'Ver Vista Móvil' : 'Ver Vista Desktop'}
                    </button>

                    <AnimatePresence mode="wait">
                        {mode === 'desktop' ? (
                            <motion.div 
                                key="desktop"
                                initial={{ opacity: 0, scale: 0.95 }}
                                animate={{ opacity: 1, scale: 1 }}
                                exit={{ opacity: 0, scale: 1.05 }}
                                className="w-full h-[90vh] max-w-[1400px] glass rounded-[60px] shadow-2xl flex overflow-hidden border border-white/50"
                            >
                                {/* Sidebar */}
                                <aside className="w-32 bg-[#E8DFD1]/40 border-r border-white/20 flex flex-col items-center py-12">
                                    <div className="w-16 h-16 bg-[#8B735B] rounded-[24px] flex items-center justify-center text-white shadow-xl mb-12">
                                        <Icon name="shield" size={32} />
                                    </div>
                                    <div className="flex flex-col gap-8 opacity-40">
                                        <Icon name="dashboard" />
                                        <Icon name="ledger" />
                                        <Icon name="zap" />
                                        <Icon name="wallet" />
                                    </div>
                                </aside>

                                {/* Main */}
                                <div className="flex-1 p-12 overflow-y-auto custom-scrollbar">
                                    <header className="flex justify-between items-center mb-12">
                                        <h1 className="text-3xl font-serif font-black uppercase tracking-[0.2em] opacity-80">Finanzas del Hogar</h1>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="text-xs font-black uppercase tracking-widest">Hogar Bimont</p>
                                                <p className="text-[10px] opacity-40 font-bold uppercase">Octubre 2023</p>
                                            </div>
                                            <div className="w-12 h-12 bg-white rounded-full border-2 border-white shadow-sm overflow-hidden">
                                                <img src="https://i.pravatar.cc/100" alt="Avatar" />
                                            </div>
                                        </div>
                                    </header>

                                    <div className="grid grid-cols-12 gap-12">
                                        {/* Gauge Section */}
                                        <div className="col-span-7 flex flex-col items-center justify-center relative">
                                            <div className="relative w-[450px] h-[450px] flex items-center justify-center">
                                                <svg width="450" height="450" className="transform -rotate-90">
                                                    <circle cx="225" cy="225" r="180" fill="transparent" stroke="rgba(139, 115, 91, 0.03)" strokeWidth="55" />
                                                    <circle cx="225" cy="225" r="180" fill="transparent" stroke="#9BB095" strokeWidth="55" strokeDasharray="150 1130" strokeDashoffset="0" strokeLinecap="round" />
                                                    <circle cx="225" cy="225" r="180" fill="transparent" stroke="#C88566" strokeWidth="55" strokeDasharray="250 1130" strokeDashoffset="-170" strokeLinecap="round" />
                                                    <circle cx="225" cy="225" r="180" fill="transparent" stroke="#D9A852" strokeWidth="55" strokeDasharray="300 1130" strokeDashoffset="-450" strokeLinecap="round" />
                                                </svg>
                                                <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                                                    <p className="text-sm opacity-40 font-black uppercase tracking-[0.3em]">Peace Point</p>
                                                    <h2 className="text-[140px] font-black tracking-tighter leading-none -mt-4">820</h2>
                                                    <p className="text-[10px] uppercase font-black tracking-[0.5em] opacity-20 mt-4">Security Score</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Info Section */}
                                        <div className="col-span-5 space-y-8 flex flex-col justify-center">
                                            <div className="bg-white/60 p-8 rounded-[48px] border border-white shadow-xl space-y-6">
                                                <h3 className="text-xs font-black uppercase tracking-[0.3em] opacity-30">Estado de Sostenibilidad</h3>
                                                <div className="space-y-2">
                                                    <div className="flex justify-between items-end">
                                                        <span className="text-5xl font-black">{sustainability}%</span>
                                                        <span className="text-xs font-bold text-green-600 uppercase">Independencia Alta</span>
                                                    </div>
                                                    <div className="w-full h-3 bg-[#F2EDE4] rounded-full overflow-hidden inner-shadow">
                                                        <div className="h-full bg-[#D9A852]" style={{ width: '85%' }} />
                                                    </div>
                                                </div>
                                                <p className="text-xs leading-relaxed opacity-60 italic font-medium">"Tu sueldo cubre el 85% de los gastos. Necesitas inyectar un 15% adicional de JANLU para mantener la expansión."</p>
                                            </div>

                                            <div className="flex gap-4">
                                                <button className="flex-1 py-6 rounded-[32px] bg-[#8B735B] text-white font-black text-xs uppercase tracking-widest shadow-xl hover:scale-105 transition-all">
                                                    Cargar Sueldo
                                                </button>
                                                <button className="flex-1 py-6 rounded-[32px] bg-white border border-[#D9A852]/30 text-[#D9A852] font-black text-xs uppercase tracking-widest shadow-xl hover:scale-105 transition-all">
                                                    Inyección JANLU
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div 
                                key="mobile"
                                initial={{ opacity: 0, y: 50 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: 50 }}
                                className="w-[390px] h-[844px] bg-white rounded-[60px] shadow-[0_50px_100px_rgba(0,0,0,0.2)] border-[12px] border-[#4A443F] relative overflow-hidden flex flex-col"
                            >
                                {/* Notch */}
                                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-8 bg-[#4A443F] rounded-b-[20px] z-50"></div>
                                
                                {/* Content */}
                                <div className="flex-1 p-8 pt-20 bg-[#F2EDE4] space-y-12">
                                    <header className="text-center space-y-2">
                                        <p className="text-[10px] font-black uppercase tracking-[0.4em] opacity-30">Nuevo Registro</p>
                                        <h2 className="text-6xl font-light tracking-tighter text-[#4A443F]">$ 145.50</h2>
                                        <p className="text-[9px] opacity-40 uppercase font-black tracking-widest mt-3">01 Oct 2023 • 14:32</p>
                                    </header>

                                    <div className="grid grid-cols-3 gap-4">
                                        {[
                                            { i: '📖', l: 'Educación' }, { i: '🏠', l: 'Hogar', a: true }, { i: '🚚', l: 'Logística' },
                                            { i: '🌱', l: 'Vital', a: false }, { i: '🍸', l: 'Ocio', a: false }, { i: '💼', l: 'Sueldo', a: false }
                                        ].map((c, i) => (
                                            <div key={i} className={`p-5 rounded-[28px] flex flex-col items-center gap-2 transition-all ${c.a ? 'bg-white shadow-xl ring-2 ring-[#8B735B]/10' : 'bg-white/40'}`}>
                                                <span className="text-2xl">{c.i}</span>
                                                <span className="text-[7px] font-black uppercase tracking-widest opacity-60">{c.l}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="space-y-6 pt-8 border-t border-[#8B735B]/10">
                                        <div className="flex justify-between items-end">
                                            <div className="space-y-1">
                                                <p className="text-[8px] font-black uppercase opacity-20 tracking-widest">Descripción</p>
                                                <p className="text-sm font-bold">Alquiler Mayo</p>
                                            </div>
                                            <div className="text-right space-y-1">
                                                <p className="text-[8px] font-black uppercase opacity-20 tracking-widest">Método</p>
                                                <p className="text-sm font-bold">Visa **** 4902</p>
                                            </div>
                                        </div>
                                    </div>

                                    <button className="w-full py-6 rounded-full bg-[#4A443F] text-white font-black text-sm uppercase tracking-widest shadow-2xl active:scale-95 transition-all">
                                        Confirmar Gasto
                                    </button>
                                </div>
                                
                                {/* Home Indicator */}
                                <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-[#4A443F]/20 rounded-full"></div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
