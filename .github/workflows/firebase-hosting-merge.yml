name: Deploy to Firebase Hosting on Merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          
      - name: Install Dependencies
        run: cd apps/finance_copilot && flutter pub get
        
      - name: Build Web
        run: |
          cd apps/finance_copilot
          flutter build web --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_FINANZAS_EAD64 }}'
          channelId: live
          projectId: app-finanzas-ead64
